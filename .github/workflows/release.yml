name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-release:
    name: Build Linux bundles and draft release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="$(python3 - <<'PYCODE'
import json
from pathlib import Path
print(json.loads(Path("package.json").read_text(encoding="utf-8"))["version"])
PYCODE
)"
            TAG="v${VERSION}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate repository version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python3 - <<'PYCODE'
import json
from pathlib import Path
print(json.loads(Path("package.json").read_text(encoding="utf-8"))["version"])
PYCODE
)"
          CARGO_VERSION="$(python3 - <<'PYCODE'
from pathlib import Path
import re
text = Path("src-tauri/Cargo.toml").read_text(encoding="utf-8")
match = re.search(r'(?m)^version = "([^"]+)"$', text)
print(match.group(1) if match else "")
PYCODE
)"
          TAURI_VERSION="$(python3 - <<'PYCODE'
import json
from pathlib import Path
print(json.loads(Path("src-tauri/tauri.conf.json").read_text(encoding="utf-8"))["version"])
PYCODE
)"

          echo "package.json: ${PACKAGE_VERSION}"
          echo "Cargo.toml: ${CARGO_VERSION}"
          echo "tauri.conf.json: ${TAURI_VERSION}"

          test "${PACKAGE_VERSION}" = "${{ steps.meta.outputs.version }}"
          test "${CARGO_VERSION}" = "${{ steps.meta.outputs.version }}"
          test "${TAURI_VERSION}" = "${{ steps.meta.outputs.version }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run check
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build bundles
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-assets
          cp -v src-tauri/target/release/bundle/deb/*.deb release-assets/
          cp -v src-tauri/target/release/bundle/rpm/*.rpm release-assets/
          cp -v src-tauri/target/release/bundle/appimage/*.AppImage release-assets/
          ls -lah release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kde-icon-helper-${{ steps.meta.outputs.version }}-linux-bundles
          path: release-assets/*
          if-no-files-found: error

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: KDE Icon Helper v${{ steps.meta.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.AppImage
